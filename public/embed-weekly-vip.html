<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly VIP Bonus</title>
</head>
<body style="margin:0;background:#0a0a0a;">

<!--
  =========================================================================
  WEEKLY VIP BONUS — embeddable snippet
  -------------------------------------------------------------------------
  HOW TO USE:
  1. Replace YOUR_VERCEL_DOMAIN with your deployed domain (no trailing slash).
  2. Replace YOUR_PUBLIC_SECRET with the value you set as PUBLIC_API_SECRET
     in Vercel (must match exactly).
  3. Paste this whole block (the #wvip-root div + the <style> + the <script>)
     into your member page. The member page MUST already store the logged-in
     user in localStorage or sessionStorage under "USER", "user", or "member"
     (as a JSON object with id / userId / username, or a plain string id).

  No manual userId input. No userId / username / phone / bank shown.
  =========================================================================
-->

<div id="wvip-root"></div>

<style>
  #wvip-root {
    --gold:#d4af37; --gold-l:#f5d77a; --gold-hi:#fff6cf; --line:#3a3320;
    max-width:560px; margin:0 auto; padding:4px;
    font-family:'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif;
    color:#f3f3f3; box-sizing:border-box;
  }
  #wvip-root *{ box-sizing:border-box; }
  .wvip-card{
    position:relative; border:1px solid var(--gold); border-radius:16px;
    padding:16px 18px; overflow:hidden;
    background:linear-gradient(160deg, rgba(20,18,10,0.95), rgba(10,10,10,0.97));
    box-shadow:0 0 22px rgba(212,175,55,0.14);
  }
  .wvip-card.done{ box-shadow:0 0 34px rgba(212,175,55,0.32); }
  .wvip-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .wvip-title{ margin:0; font-size:16px; font-weight:900; color:var(--gold-l); letter-spacing:.5px; }
  .wvip-tag{
    display:inline-block; margin-top:4px; font-size:9px; letter-spacing:1px; font-weight:800;
    color:var(--gold); border:1px solid var(--gold); border-radius:6px; padding:2px 6px;
    background:rgba(212,175,55,0.08);
  }
  .wvip-dep{ text-align:right; white-space:nowrap; }
  .wvip-dep-label{ font-size:10px; letter-spacing:1px; color:var(--gold); font-weight:800; }
  .wvip-dep-amt{
    font-size:30px; font-weight:900; line-height:1.05;
    background:linear-gradient(180deg,#fff,var(--gold-l) 55%,var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 12px rgba(212,175,55,0.5));
  }
  .wvip-status{ margin:10px 0 6px; font-size:12.5px; font-weight:700; }
  .wvip-status.secured{ color:var(--gold-l); }
  .wvip-status.need{ color:#ffcf6b; }
  .wvip-unlock{ font-size:11px; color:#9a9a9a; margin-bottom:6px; }

  .wvip-track{ position:relative; height:90px; }
  .wvip-area{ position:absolute; left:34px; right:34px; top:4px; bottom:0; }
  .wvip-node{ position:absolute; top:0; width:62px; transform:translateX(-50%); text-align:center; }
  .wvip-pill{
    display:inline-block; font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px;
    border:1px solid #444; background:#1a1a1a; color:#9a9a9a; white-space:nowrap;
  }
  .wvip-pill.lit{
    color:#1a1407; border-color:var(--gold-hi);
    background:linear-gradient(135deg,var(--gold-l),var(--gold));
    box-shadow:0 0 12px rgba(212,175,55,0.6);
  }
  .wvip-pill.next{ color:var(--gold-l); border-color:var(--gold); background:rgba(212,175,55,0.12); }

  .wvip-chest{ width:34px; height:30px; position:relative; margin:5px auto 0; }
  .wvip-chest .lid{ position:absolute; top:0; left:0; right:0; height:14px; border-radius:18px 18px 0 0;
    background:linear-gradient(#5a5a5a,#3a3a3a); border:2px solid #6a6a6a; border-bottom:none; }
  .wvip-chest .body{ position:absolute; bottom:0; left:1px; right:1px; height:18px; border-radius:3px 3px 5px 5px;
    background:linear-gradient(#4a4a4a,#262626); border:2px solid #5b5b5b; }
  .wvip-chest.open .lid{ background:linear-gradient(#ffe9a0,#d4af37); border-color:#fff6cf; }
  .wvip-chest.open .body{ background:linear-gradient(#e7c252,#b8860b); border-color:#fff0bf; }
  .wvip-chest.open{ filter:drop-shadow(0 0 10px rgba(212,175,55,0.85)); }
  .wvip-chest.pulse{ animation:wvipPulse 1.6s ease-in-out infinite; }
  @keyframes wvipPulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

  .wvip-rail{ position:absolute; left:0; right:0; top:56px; height:10px; border-radius:999px;
    background:#241f10; border:1px solid var(--line); overflow:hidden; }
  .wvip-fill{ height:100%; border-radius:999px;
    background:linear-gradient(90deg,var(--gold),var(--gold-l)); box-shadow:0 0 12px rgba(212,175,55,0.6); }
  .wvip-head-dot{ position:absolute; top:52px; width:16px; height:16px; transform:translateX(-50%);
    border-radius:50%; background:radial-gradient(circle,var(--gold-hi),var(--gold));
    box-shadow:0 0 14px var(--gold-l); z-index:3; }
  .wvip-scale{ position:absolute; top:72px; transform:translateX(-50%); font-size:10px; font-weight:700; color:#9a9a9a; }

  .wvip-note{ font-size:10.5px; color:#8a8a8a; text-align:center; margin-top:8px; }
  .wvip-msg{ text-align:center; color:#999; font-size:13px; padding:18px 8px; }

  @media (max-width:480px){
    .wvip-area{ left:24px; right:24px; }
    .wvip-node{ width:48px; }
    .wvip-pill{ font-size:9px; padding:2px 4px; }
    .wvip-chest{ width:28px; height:26px; }
    .wvip-dep-amt{ font-size:24px; }
  }
</style>

<script>
(function () {
  "use strict";

  // ===== CONFIG — replace these two values =====
  var API_BASE = "https://YOUR_VERCEL_DOMAIN";   // e.g. https://deposit-progress-api.vercel.app
  var API_SECRET = "YOUR_PUBLIC_SECRET";          // must match PUBLIC_API_SECRET in Vercel
  // =============================================

  var REFRESH_MS = 10000;
  var MAX = 5000;
  var MILESTONES = [
    { target: 1000, reward: 100 },
    { target: 2000, reward: 200 },
    { target: 3000, reward: 300 },
    { target: 4000, reward: 400 },
    { target: 5000, reward: 500 }
  ];

  var root = document.getElementById("wvip-root");

  function rm(n) {
    n = Number(n) || 0;
    return "RM " + n.toLocaleString("en-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function rmShort(n) { return "RM " + (Number(n) || 0).toLocaleString("en-MY"); }
  function clampPct(v, max) { return Math.min(100, Math.round(((Number(v) || 0) / max) * 100)); }

  // ---- Read the logged-in user from storage (no manual input) ----
  function pickId(v) {
    if (v == null) return null;
    if (typeof v === "string" || typeof v === "number") {
      var s = String(v).trim();
      return s || null;
    }
    if (typeof v === "object") {
      return (
        v.id || v.userId || v.username ||
        (v.data && pickId(v.data)) ||
        (v.user && pickId(v.user)) ||
        null
      );
    }
    return null;
  }
  function readUser() {
    var keys = ["USER", "user", "member"];
    var stores = [];
    try { stores.push(window.localStorage); } catch (e) {}
    try { stores.push(window.sessionStorage); } catch (e) {}
    for (var s = 0; s < stores.length; s++) {
      for (var k = 0; k < keys.length; k++) {
        var raw = null;
        try { raw = stores[s].getItem(keys[k]); } catch (e) {}
        if (!raw) continue;
        var val = raw;
        try { val = JSON.parse(raw); } catch (e) { /* plain string id */ }
        var id = pickId(val);
        if (id) return String(id);
      }
    }
    return null;
  }

  function message(text) {
    root.innerHTML = '<div class="wvip-card"><div class="wvip-msg">' + text + "</div></div>";
  }

  function render(week) {
    var achieved = null, next = null;
    for (var i = MILESTONES.length - 1; i >= 0; i--) {
      if (week >= MILESTONES[i].target) { achieved = MILESTONES[i]; break; }
    }
    for (var j = 0; j < MILESTONES.length; j++) {
      if (week < MILESTONES[j].target) { next = MILESTONES[j]; break; }
    }
    var nextTarget = next ? next.target : null;

    var statusCls = "need", statusTxt = "";
    if (achieved && !next) {
      statusCls = "secured";
      statusTxt = "🔒 Tier 5 secured — " + rmShort(achieved.reward) + " this week";
    } else if (achieved && next) {
      statusCls = "secured";
      statusTxt = "🔒 Tier " + tierIndex(achieved) + " secured — " + rmShort(achieved.reward) +
        " · ⚡ Need " + rm(next.target - week) + " more for " + rmShort(next.reward);
    } else {
      statusCls = "need";
      statusTxt = "⚡ Need " + rm(next.target - week) + " more to secure " + rmShort(next.reward);
    }

    var fill = clampPct(week, MAX);
    var nodes = "";
    for (var n = 0; n < MILESTONES.length; n++) {
      var m = MILESTONES[n];
      var left = (m.target / MAX) * 100;
      var unlocked = week >= m.target;
      var isNext = m.target === nextTarget;
      var pillCls = unlocked ? "lit" : (isNext ? "next" : "");
      nodes +=
        '<div class="wvip-node" style="left:' + left + '%">' +
          '<span class="wvip-pill ' + pillCls + '">' + rmShort(m.reward) + "</span>" +
          '<div class="wvip-chest ' + (unlocked ? "open" : "lock") + " " + (isNext ? "pulse" : "") + '">' +
            '<div class="lid"></div><div class="body"></div>' +
          "</div>" +
        "</div>";
    }
    var stops = [0, 1000, 2000, 3000, 4000, 5000];
    var scale = "";
    for (var sIdx = 0; sIdx < stops.length; sIdx++) {
      scale += '<span class="wvip-scale" style="left:' + ((stops[sIdx] / MAX) * 100) + '%">' +
        stops[sIdx].toLocaleString("en-MY") + "</span>";
    }

    root.innerHTML =
      '<div class="wvip-card ' + (achieved && !next ? "done" : "") + '">' +
        '<div class="wvip-head">' +
          "<div>" +
            '<h3 class="wvip-title">👑 Weekly VIP Bonus</h3>' +
            '<span class="wvip-tag">HIGHEST TIER ONLY</span>' +
          "</div>" +
          '<div class="wvip-dep">' +
            '<div class="wvip-dep-label">THIS WEEK DEPOSIT</div>' +
            '<div class="wvip-dep-amt">' + rm(week) + "</div>" +
          "</div>" +
        "</div>" +
        '<div class="wvip-status ' + statusCls + '">' + statusTxt + "</div>" +
        '<div class="wvip-unlock">Bonus unlocks next Monday 12:00 AM · rewards are not cumulative</div>' +
        '<div class="wvip-track"><div class="wvip-area">' +
          nodes +
          '<div class="wvip-rail"><div class="wvip-fill" style="width:' + fill + '%"></div></div>' +
          '<div class="wvip-head-dot" style="left:' + fill + '%"></div>' +
          scale +
        "</div></div>" +
        '<div class="wvip-note">↻ Auto-refreshing every 10s</div>' +
      "</div>";
  }

  function tierIndex(m) {
    for (var i = 0; i < MILESTONES.length; i++) if (MILESTONES[i].target === m.target) return i + 1;
    return "";
  }

  var userId = readUser();

  async function load() {
    if (!userId) {
      message("Please log in to view your Weekly VIP Bonus.");
      return;
    }
    try {
      var url = API_BASE + "/api/deposit-progress?userId=" +
        encodeURIComponent(userId) + "&period=week";
      var res = await fetch(url, { headers: { "x-api-secret": API_SECRET }, cache: "no-store" });
      var json = await res.json();
      if (!res.ok || !json.success) throw new Error(json.message || "Request failed");
      render(Number(json.currentAmount) || 0);
    } catch (e) {
      message("Unable to load bonus progress right now.");
    }
  }

  message("Loading Weekly VIP Bonus…");
  load();
  setInterval(load, REFRESH_MS);
})();
</script>

</body>
</html>
